name: Agent Fix Pass

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to process
        required: false
        type: string
      branch:
        description: Branch to push fixes to (defaults to PR head)
        required: false
        type: string
      run_tests:
        description: Run tests after applying fixes
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 * * * *" # hourly

concurrency:
  group: agent-fix-pass
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-and-run:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUN_TESTS: ${{ inputs.run_tests }}
    steps:
      - name: Select PRs
        id: select
        run: |
          # If manual input provided, use it; else list label-filtered PRs.
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "pr_list=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          prs=$(gh pr list --state open --label "needs-agent-fix" --json number,isDraft,headRefName --limit 5 \
            | jq -r '.[] | select(.isDraft==false) | .number' | tr '\n' ' ' | sed 's/ *$//')
          echo "pr_list=${prs}" >> "$GITHUB_OUTPUT"
      - name: Fail if nothing to do
        if: steps.select.outputs.pr_list == ''
        run: |
          echo "No open PRs with label needs-agent-fix (or none provided)."
          exit 0
      - name: Iterate PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prs = "${{ steps.select.outputs.pr_list }}".trim().split(/\s+/).filter(Boolean);
            core.setOutput('matrix', JSON.stringify(prs));
      - name: Set matrix
        run: echo "matrix=${{ steps.iterate.outputs.matrix }}"

  agent-fix:
    needs: discover-and-run
    if: needs.discover-and-run.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.discover-and-run.outputs.matrix) }}
    env:
      PR_NUMBER: ${{ matrix.pr }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUN_TESTS: ${{ inputs.run_tests }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - name: Fetch PR comments and threads
        run: |
          gh pr view "$PR_NUMBER" --json comments,reviewThreads > agent-comments.json

      - name: Install Node (for tooling only)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run agent fixer (stub)
        run: |
          node scripts/agent-fix.js agent-comments.json > agent-summary.md

      - name: Optional tests
        if: env.RUN_TESTS == 'true'
        run: |
          echo "RUN_TESTS=true — add project-specific test commands here."

      - name: Commit and push changes if any
        run: |
          if git diff --quiet; then
            echo "No code changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "agent: apply fixes from review comments"
          git push origin HEAD

      - name: Post summary comment
        run: |
          gh pr comment "$PR_NUMBER" --body-file agent-summary.md
